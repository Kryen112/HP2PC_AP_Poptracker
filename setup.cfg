[flake8]
# Mirrors the apworld's lint standard: 120 columns, complexity 14.
max-line-length = 120
max-complexity = 14
# make_icons.py and ue1_textures.py use compact `a; b` statements deliberately
# (subcommand dispatch tables, and byte-stream read-and-advance pairs where
# splitting a read from its cursor bump would hurt readability).
per-file-ignores =
    tools/make_icons.py: E702
    tools/ue1_textures.py: E702
